# AIPocalypse — nginx reverse proxy
#
# Drop this file into /etc/nginx/sites-enabled/ (or include it from nginx.conf).
# Assumes the app container is reachable at localhost:5555.
#
# Production URL: https://mestr.io/labs/aipocalypse

location /labs/aipocalypse/ {
    proxy_pass http://127.0.0.1:5555/;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Strip the /labs/aipocalypse prefix before forwarding.
    # The trailing slashes on location and proxy_pass handle this:
    #   /labs/aipocalypse/admin  ->  /admin
    #   /labs/aipocalypse/       ->  /

    # WebSocket support (future-proofing)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;
}
